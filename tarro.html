<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S1ST3M_TARR1T0_C0FR3</title>
    <style>
        body {
            background-color: #000;
            background-image: radial-gradient(circle, #001100 0%, #000000 100%);
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Efecto pantalla antigua */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
        }

        h1 {
            text-shadow: 0 0 10px #00ff00;
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff;
            margin-bottom: 40px;
            font-size: 0.9rem;
            text-align: center;
        }

        /* EL COFRE DIGITAL (HECHO CON CSS NEÓN) */
        .cofre-container {
            cursor: pointer;
            position: relative;
            width: 160px;
            height: 120px;
            margin-bottom: 40px;
            transition: transform 0.3s ease;
        }

        .cofre-container:hover {
            transform: scale(1.08);
        }

        /* Tapa del cofre */
        .cofre-tapa {
            width: 160px;
            height: 50px;
            border: 2px solid #00ff00;
            background-color: rgba(0, 40, 10, 0.6);
            border-radius: 40px 40px 0 0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            transition: all 0.5s ease;
            position: absolute;
            top: 0;
            z-index: 2;
        }

        /* Base del cofre */
        .cofre-base {
            width: 160px;
            height: 70px;
            border: 2px solid #00ff00;
            background-color: rgba(0, 20, 5, 0.9);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4), inset 0 0 10px rgba(0, 255, 0, 0.3);
            position: absolute;
            bottom: 0;
            z-index: 1;
        }

        /* Cerradura brillante */
        .cofre-lock {
            width: 20px;
            height: 25px;
            background-color: #00ffff;
            border-radius: 3px;
            position: absolute;
            top: 40px;
            left: 70px;
            z-index: 3;
            box-shadow: 0 0 10px #00ffff;
            transition: all 0.5s ease;
        }

        /* Animación cuando abres el cofre */
        .cofre-container.open .cofre-tapa {
            transform: translateY(-35px) rotate(-15deg);
            border-color: #ff0055;
            box-shadow: 0 0 20px #ff0055;
        }
        
        .cofre-container.open .cofre-lock {
            transform: translateY(-35px) rotate(-15deg);
            background-color: #ff0055;
            box-shadow: 0 0 10px #ff0055;
        }

        /* EL PAPELITO QUE SALE DEL COFRE */
        .papelito-display {
            width: 100%;
            max-width: 500px;
            min-height: 120px;
            background-color: rgba(0, 10, 5, 0.95);
            border: 2px dashed #00ffff;
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease-in-out;
        }

        .papelito-display.show {
            opacity: 1;
            transform: translateY(0);
        }

        .papelito-numero {
            font-size: 0.85rem;
            color: #ff0055;
            font-weight: bold;
            text-shadow: 0 0 5px #ff0055;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .papelito-texto {
            font-size: 1.1rem;
            color: #fff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            line-height: 1.4;
        }

        .instruccion-cofre {
            font-size: 0.9rem;
            color: #ff94c2;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .btn-volver {
            margin-top: 40px;
            color: #ff0055;
            border: 1px solid #ff0055;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
            transition: all 0.3s ease;
        }

        .btn-volver:hover {
            background-color: #ff0055;
            color: #000;
            box-shadow: 0 0 20px #ff0055;
        }
    </style>
</head>
<body>

    <h1>[ ARCHIVO RAZONES POR LA QUE ME ENCANTAS  ]</h1>
    <div class="subtitle">> Extrayendo base de datos de afecto encriptado...</div>

    <div class="instruccion-cofre">¡TOCA EL COFRE PARA SACAR UN PAPELITO! 🔓</div>

    <!-- EL COFRE -->
    <div class="cofre-container" id="cofre" onclick="abrirCofre()">
        <div class="cofre-tapa"></div>
        <div class="cofre-lock"></div>
        <div class="cofre-base"></div>
    </div>

    <!-- EL PAPELITO QUE MUESTRA LAS COSAS QUE TE GUSTAN -->
    <div class="papelito-display" id="papelito">
        <div class="papelito-numero" id="papelitoNumero">PAPELITO #00</div>
        <div class="papelito-texto" id="papelitoTexto">Haz clic en el cofre holográfico para leer...</div>
    </div>

    <a href="inicio2.html" class="btn-volver">< VOLVER AL MENÚ</a>

    <script>
        // AQUÍ ESTÁN TUS 100 FRASES (Te dejé las primeras de ejemplo, pon las tuyas aquí)
        const razones = [
            "Me encanta tu humor .",
            "Me fascina la forma tan linda que te expresas .",
            "Me encanta lo inteligente que eres .",
            "Me gusta que siempre encuentras una manera de hacerme sentir especial.",
            "Me encantan tu carita linda .",
            "Me fascina cómo quieres a los animales.",
            "Me encanta que podemos pasar horas hablando de cualquier tontería.",
            "Me gusta tu estilo único y lo especial que eres.",
            "Me encanta la paciencia infinita que me tienes.",
            "Me fascina tu voz .",
            // Sigue añadiendo comas y frases aquí abajo hasta completar las 100...
            "Me encanta cuando me haces reir .",
            " Simplemente amo todo de ti y soy muy feliz de tenerte en mi vida."
        ];

        const cofre = document.getElementById('cofre');
        const papelito = document.getElementById('papelito');
        const papelitoNumero = document.getElementById('papelitoNumero');
        const papelitoTexto = document.getElementById('papelitoTexto');

        function abrirCofre() {
            // Activa la animación visual de abrir
            cofre.classList.add('open');
            papelito.classList.remove('show'); // Esconde el papelito anterior por un segundo

            setTimeout(() => {
                // Elige un papelito al azar del listado
                const indexAzar = Math.floor(Math.random() * razones.length);
                const fraseSeleccionada = razones[indexAzar];
                
                // Actualiza los textos
                papelitoNumero.textContent = `PAPELITO_DECRYPTED #${indexAzar + 1}`;
                papelitoTexto.textContent = `"${fraseSeleccionada}"`;
                
                // Muestra el papelito con la animación suave
                papelito.classList.add('show');
                
                // Cierra un poquito el cofre visualmente para que lo vuelva a intentar
                setTimeout(() => {
                    cofre.classList.remove('open');
                }, 600);

            }, 300);
        }
    </script>
</body>
</html>
